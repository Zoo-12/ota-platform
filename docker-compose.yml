version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: ota-mysql
    environment:
      MYSQL_DATABASE: ota
      MYSQL_USER: ota
      MYSQL_PASSWORD: ota
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ota-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: ota-redis
    ports:
      - "6379:6379"

volumes:
  ota-mysql-data:
