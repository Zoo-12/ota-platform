spring:
  application:
    name: ota-platform

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ota?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:ota}
    password: ${DB_PASSWORD:ota}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 로깅 설정은 logback-spring.xml에서 프로필별로 관리
